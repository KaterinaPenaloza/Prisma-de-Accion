<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎Prisma de Acción💎</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Task wrapper & expand ── */
    .task-wrapper {
      margin-bottom: 8px;
    }

    .task {
      margin-bottom: 0;
      border-radius: 8px 8px 0 0;
      transition: border-radius 0.2s;
    }

    .task:not(.expanded) {
      border-radius: 8px;
    }

    .task-main {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
    }

    .task-text {
      flex: 1;
      min-width: 0;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .has-desc-dot {
      font-size: 8px;
      color: #7c9bcc;
      line-height: 1;
    }

    .expand-arrow {
      font-size: 13px;
      color: #888;
      transition: transform 0.25s ease;
      line-height: 1;
    }

    .task.expanded .expand-arrow {
      transform: rotate(180deg);
    }

    /* ── Inline detail panel ── */
    .task-detail {
      max-height: 0;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid transparent;
      border-top: none;
      border-radius: 0 0 8px 8px;
      transition: max-height 0.3s ease, padding 0.3s ease, border-color 0.3s ease;
      padding: 0 10px;
    }

    .task-detail.open {
      max-height: 180px;
      padding: 10px;
      border-color: rgba(255,255,255,0.1);
    }

    .inline-desc-textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: inherit;
      font-family: inherit;
      font-size: 0.82rem;
      padding: 8px 10px;
      box-sizing: border-box;
      outline: none;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .inline-desc-textarea:focus {
      border-color: rgba(255,255,255,0.35);
    }

    .inline-desc-textarea::placeholder {
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }

    .inline-save-btn {
      margin-top: 6px;
      padding: 4px 14px;
      font-size: 0.78rem;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 5px;
      color: inherit;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .inline-save-btn:hover {
      background: rgba(255,255,255,0.22);
    }

    .inline-save-btn.saved {
      background: rgba(100,210,130,0.25);
      border-color: rgba(100,210,130,0.4);
    }

    /* ── Modal: description field ── */
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .modal-field label {
      font-size: 0.8rem;
      opacity: 0.65;
      font-weight: 500;
      letter-spacing: 0.03em;
    }

    #taskDescInput {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 12px;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
      line-height: 1.5;
    }

    /* Re-use existing input styling via class */
    #taskDescInput {
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: inherit;
      transition: border-color 0.2s;
    }

    #taskDescInput:focus {
      border-color: rgba(255,255,255,0.4);
    }

    #taskDescInput::placeholder {
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Prisma de Acción 💎</h1>
      <p class="subtitle">Organiza tus tareas por urgencia e importancia</p>
    </header>

    <div class="grid">
      <section class="quadrant q2" data-quadrant="q2">
        <div class="quadrant-header">
          <h2>📅 No Urgente - Importante</h2>
          <p class="quadrant-desc">Planifica</p>
        </div>
        <div class="tasks-container" id="tasks-q2"></div>
        <button class="add-task-btn" data-quadrant="q2">+ Agregar tarea</button>
      </section>

      <section class="quadrant q1" data-quadrant="q1">
        <div class="quadrant-header">
          <h2>🔥 Urgente - Importante</h2>
          <p class="quadrant-desc">¡Hacerlo ya!</p>
        </div>
        <div class="tasks-container" id="tasks-q1"></div>
        <button class="add-task-btn" data-quadrant="q1">+ Agregar tarea</button>
      </section>

      <section class="quadrant q4" data-quadrant="q4">
        <div class="quadrant-header">
          <h2>🗑️ No Urgente - No Importante</h2>
          <p class="quadrant-desc">De chill</p>
        </div>
        <div class="tasks-container" id="tasks-q4"></div>
        <button class="add-task-btn" data-quadrant="q4">+ Agregar tarea</button>
      </section>

      <section class="quadrant q3" data-quadrant="q3">
        <div class="quadrant-header">
          <h2>⚡ Urgente - No Importante</h2>
          <p class="quadrant-desc">Delegar</p>
        </div>
        <div class="tasks-container" id="tasks-q3"></div>
        <button class="add-task-btn" data-quadrant="q3">+ Agregar tarea</button>
      </section>
    </div>
  </div>

  <!-- Modal para agregar/editar tarea -->
  <div class="modal" id="taskModal">
    <div class="modal-content">
      <h3 id="modalTitle">Nueva Tarea</h3>

      <div class="modal-field">
        <label for="taskInput">Título</label>
        <input 
          type="text" 
          id="taskInput" 
          placeholder="Nombre de la tarea..."
          maxlength="200"
        >
      </div>

      <div class="modal-field">
        <label for="taskDescInput">Descripción <span style="opacity:0.45">(opcional)</span></label>
        <textarea
          id="taskDescInput"
          placeholder="Notas, contexto, pasos a seguir..."
          maxlength="500"
        ></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">Cancelar</button>
        <button class="btn-save" id="saveBtn">Guardar</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
